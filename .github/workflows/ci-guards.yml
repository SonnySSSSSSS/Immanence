name: CI Guards

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  persistence-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Node version
        id: node
        shell: bash
        run: |
          if [ -f .nvmrc ]; then
            v="$(cat .nvmrc | tr -d '\r\n')"
            v="${v#v}"
            echo "version=$v" >> "$GITHUB_OUTPUT"
          else
            echo "version=20" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Persistence Audit Guard
        run: npm run guard:persistence-audit

